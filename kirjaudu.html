<!DOCTYPE html>
<html lang="fi">

<head>
    <meta charset="UTF-8">
    <title>Kirjaudu – Harkkaportaali</title>
    <link rel="stylesheet" href="./styles/styles.css">
</head>

<body>

<header>
    <nav>
        <img src="./kuvat/Harkkaportti logo.png" alt="Harkkaportaali logo" class="logo-img">
        <div class="logo">Harkkaportaali</div>
        <ul>
            <li><a href="index.html">ETUSIVU</a></li>
            <li><a href="ilmoitukset.html">ILMOITUKSET</a></li>
            <li><a href="palaute.html">PALAUTE</a></li>
            <li><a href="tietoa.html">TIETOA</a></li>
            <li><a href="kirjaudu.html" class="login-btn active">KIRJAUDU</a></li>
        </ul>
    </nav>
</header>

<main>

    <section class="login-section">

        <div class="login-box">
            <h2>Kirjaudu sisään</h2>
            <p>Tervetuloa takaisin! Syötä tunnuksesi jatkaaksesi.</p>

            <form class="login-form">
                <label for="email">Sähköposti</label>
                <input type="email" id="email" placeholder="esimerkki@posti.fi" required>

                <label for="password">Salasana</label>
                <input type="password" id="password" placeholder="Salasana" required>

                <button type="submit" class="login-submit">Kirjaudu</button>
            </form>

            <p class="register-text">
                Ei tiliä? <a href="./luo-kayttaja.html">Luo käyttäjä</a>
            </p>
        </div>

    </section>

</main>

<footer>
    <p>© 2026 Harkkaportaali – Konseptiprototyyppi</p>
</footer>

</body>
</html>
